<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEMAL MOD | Türkiye'nin 1 Numaralı APK Merkezi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;600;800&display=swap');
        
        :root { --bg: #060a14; --card: #101827; --primary: #2563eb; --accent: #fbbf24; --success: #10b981; --text: #f8fafc; }
        
        * { box-sizing: border-box; transition: 0.3s ease; }
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; margin: 0; overflow-x: hidden; }

        /* HEADER - TAM EKRAN VE GÜÇLÜ */
        header { background: linear-gradient(180deg, #1e293b 0%, var(--bg) 100%); padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--primary); }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 3rem; font-weight: 900; color: white; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 20px rgba(37, 99, 235, 0.6); margin: 0; }
        .sub-logo { font-size: 0.9rem; color: var(--primary); letter-spacing: 2px; font-weight: bold; }

        /* ARAMA VE GELİŞMİŞ KATEGORİLER */
        .main-controls { padding: 30px 5%; max-width: 1400px; margin: auto; }
        .search-wrapper { position: relative; max-width: 800px; margin: 0 auto 30px; }
        .search-wrapper input { width: 100%; padding: 20px 65px; border-radius: 15px; border: 2px solid #1e293b; background: var(--card); color: white; font-size: 1.1rem; }
        .search-wrapper i { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); color: var(--primary); font-size: 1.4rem; }
        .search-wrapper input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 30px rgba(37, 99, 235, 0.2); }

        .cat-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0; scrollbar-width: none; justify-content: center; }
        .cat-item { background: var(--card); border: 1px solid #1e293b; color: #94a3b8; padding: 12px 25px; border-radius: 12px; cursor: pointer; white-space: nowrap; font-weight: 600; font-size: 0.9rem; }
        .cat-item:hover, .cat-item.active { background: var(--primary); color: white; border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); }

        /* OYUN KARTLARI - FULL EKRAN DÜZENİ */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; padding: 0 5%; max-width: 1600px; margin: 20px auto; }
        .game-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #1e293b; position: relative; display: flex; flex-direction: column; }
        .game-card:hover { border-color: var(--primary); transform: scale(1.02); z-index: 2; }
        
        .img-container { position: relative; width: 100%; height: 210px; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .badge { position: absolute; top: 15px; right: 15px; background: var(--primary); color: white; padding: 5px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }

        .card-content { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }
        .title { font-size: 1.5rem; font-weight: 800; margin: 0 0 10px; color: white; }
        
        .info-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 10px 15px; border-radius: 12px; margin-bottom: 15px; }
        .ver { color: #94a3b8; font-size: 0.85rem; font-weight: bold; }
        .rating { color: var(--accent); font-weight: 900; }

        .mod-desc { color: var(--success); font-size: 0.9rem; font-weight: 500; line-height: 1.5; margin-bottom: 20px; min-height: 40px; }
        .download-btn { background: linear-gradient(90deg, var(--primary), #1d4ed8); color: white; text-align: center; padding: 16px; border-radius: 14px; text-decoration: none; font-weight: 800; font-size: 1rem; }
        .download-btn:hover { letter-spacing: 1px; filter: brightness(1.2); }

        /* YENİ: İSTATİSTİK BARI */
        .stats-bar { display: flex; justify-content: space-around; padding: 40px 5%; background: var(--card); margin-top: 50px; border-top: 1px solid #1e293b; }
        .stat-item { text-align: center; }
        .stat-num { font-size: 2rem; font-weight: 900; color: var(--primary); display: block; }
        .stat-label { font-size: 0.8rem; color: #64748b; text-transform: uppercase; font-weight: bold; }

        /* INSTAGRAM & SOSYAL MEDYA */
        .social-box { margin: 60px auto; max-width: 500px; padding: 30px; border: 2px solid var(--accent); border-radius: 30px; text-align: center; background: linear-gradient(45deg, rgba(251, 191, 36, 0.05), transparent); }
        .social-title { font-size: 0.7rem; letter-spacing: 4px; color: var(--accent); font-weight: 900; margin-bottom: 15px; display: block; }
        .insta-btn { font-size: 2.2rem; font-weight: 900; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .insta-btn i { color: #e1306c; }

        footer { text-align: center; padding: 40px; color: #334155; font-size: 0.8rem; font-weight: bold; }

        @media (max-width: 768px) { .logo { font-size: 2rem; } .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <h1 class="logo">KEMAL MOD</h1>
        <span class="sub-logo">İNEGÖL'ÜN DÜNYAYA AÇILAN APK KAPISI</span>
    </header>

    <div class="main-controls">
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="gameSearch" placeholder="Efsane oyunları ara Kemal abi..." onkeyup="doSearch()">
        </div>

        <div class="cat-scroll">
            <div class="cat-item active" onclick="doFilter('Hepsi', this)">Tümü</div>
            <div class="cat-item" onclick="doFilter('Popüler', this)">🔥 Popüler</div>
            <div class="cat-item" onclick="doFilter('Aksiyon', this)">💣 Aksiyon</div>
            <div class="cat-item" onclick="doFilter('Spor', this)">⚽ Spor</div>
            <div class="cat-item" onclick="doFilter('Yarış', this)">🏎️ Yarış</div>
            <div class="cat-item" onclick="doFilter('Simülasyon', this)">🚜 Simülasyon</div>
        </div>
    </div>

    <main class="grid" id="gameGrid"></main>

    <div class="stats-bar">
        <div class="stat-item"><span class="stat-num" id="totalMods">0</span><span class="stat-label">Toplam Mod</span></div>
        <div class="stat-item"><span class="stat-num">2.4K+</span><span class="stat-label">Günlük İndirme</span></div>
        <div class="stat-item"><span class="stat-num" id="onlineUsers">1</span><span class="stat-label">Online Üye</span></div>
    </div>

    <div class="social-box">
        <span class="social-title">RESMİ INSTAGRAM HESABI</span>
        <a href="https://instagram.com/Ke4m2l" target="_blank" class="insta-btn">
            <i class="fab fa-instagram"></i> @Ke4m2l
        </a>
    </div>

    <footer>© 2026 KEMAL MOD V6 | TÜM HAKLARI KEMAL ABİDE SAKLIDIR</footer>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCYS1dMW6uGt8cwJVs6cspNBuX0TTOGS_c", databaseURL: "https://kemalmod-resmi-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Online Sayacı
        const onlineRef = db.ref('online').push();
        onlineRef.set(true);
        onlineRef.onDisconnect().remove();
        db.ref('online').on('value', s => document.getElementById('onlineUsers').innerText = s.numChildren());

        // Verileri Çek ve Listele
        db.ref('mods').on('value', snap => {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = "";
            let count = 0;
            snap.forEach(child => {
                count++;
                const g = child.val();
                const ver = g.version && g.version !== "undefined" ? g.version : "v1.0.0";
                
                grid.innerHTML += `
                <div class="game-card" data-cat="${g.category}">
                    <div class="img-container">
                        <img src="${g.img}" alt="${g.name}">
                        <span class="badge">${g.category}</span>
                    </div>
                    <div class="card-content">
                        <h3 class="title">${g.name}</h3>
                        <div class="info-row">
                            <span class="ver"><i class="fas fa-layer-group"></i> ${ver}</span>
                            <span class="rating"><i class="fas fa-star"></i> 5.0</span>
                        </div>
                        <p class="mod-desc"><i class="fas fa-bolt"></i> ${g.mod}</p>
                        <a href="${g.link}" target="_blank" class="download-btn">DOSYAYI İNDİR</a>
                    </div>
                </div>`;
            });
            document.getElementById('totalMods').innerText = count;
        });

        function doSearch() {
            let s = document.getElementById('gameSearch').value.toLowerCase();
            document.querySelectorAll('.game-card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(s) ? "flex" : "none";
            });
        }

        function doFilter(cat, btn) {
            document.querySelectorAll('.cat-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.game-card').forEach(c => {
                c.style.display = (cat === 'Hepsi' || c.getAttribute('data-cat') === cat) ? "flex" : "none";
            });
        }
    </script>
</body>
</html>
