<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEMAL MOD | APK</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #070d19; color: white; font-family: sans-serif; margin: 0; }
        
        /* BAKIM EKRANI - TÜM SAYFAYI KAPLAR */
        #bakim-perdesi {
            display: none; /* Başlangıçta gizli */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #070d19; z-index: 999999;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }

        .uyari-metni { font-size: 2.5rem; color: #ff3b3b; font-weight: bold; margin-bottom: 10px; }
        .alt-metin { font-size: 1.2rem; color: #ccc; }
        .yukleniyor-simge { font-size: 4rem; margin: 30px 0; animation: don 2s linear infinite; display: inline-block; }
        
        @keyframes don { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* SİTE İÇERİĞİ */
        #ana-site { display: block; }
        header { background: #121c2d; padding: 20px; text-align: center; border-bottom: 2px solid #0066ff; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; gap: 20px; }
        .game-card { background: #121c2d; width: 280px; border-radius: 10px; padding: 15px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="bakim-perdesi">
        <div class="uyari-metni">SİTE BAKIMDADIR</div>
        <div class="alt-metin">Kemal abi şu an güncellemeleri yapıyor...</div>
        <div class="yukleniyor-simge">⚙️</div>
        <div style="color: #555; margin-top: 20px;">Lütfen daha sonra tekrar deneyiniz.</div>
    </div>

    <div id="ana-site">
        <header><h1>KEMAL MOD</h1></header>
        <div class="container" id="gameContainer">
            </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCYS1dMW6uGt8cwJVs6cspNBuX0TTOGS_c", databaseURL: "https://kemalmod-resmi-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // BAKIM KONTROLÜ
        db.ref('bakimModu').on('value', (s) => {
            const bakimda = s.val();
            const perde = document.getElementById('bakim-perdesi');
            const site = document.getElementById('ana-site');

            if(bakimda) {
                perde.style.display = "flex";
                site.style.display = "none"; // Siteyi tamamen yok et
            } else {
                perde.style.display = "none";
                site.style.display = "block"; // Siteyi geri getir
            }
        });

        // Oyun Çekme (Örnek)
        db.ref('mods').on('value', (snap) => {
            const container = document.getElementById('gameContainer');
            container.innerHTML = "";
            snap.forEach((child) => {
                const g = child.val();
                container.innerHTML += `<div class="game-card"><strong>${g.name}</strong><br><small>${g.mod}</small></div>`;
            });
        });
    </script>
</body>
</html>
