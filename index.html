<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEMAL MOD | APK MERKEZİ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #070d19; color: white; font-family: sans-serif; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* BAKIM PERDESİ */
        #bakim-perdesi {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #070d19; z-index: 999999; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }

        /* ANA SİTE STİLLERİ */
        header { background: #121c2d; padding: 30px; text-align: center; border-bottom: 2px solid #0066ff; }
        .search-area { padding: 20px; text-align: center; background: #0a1425; }
        #searchInput { width: 85%; max-width: 500px; padding: 12px; border-radius: 25px; border: 1px solid #0066ff; background: #121c2d; color: white; outline: none; }
        
        .categories { margin-top: 15px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .cat-btn { background: #1e2a42; color: white; border: 1px solid #333; padding: 8px 15px; border-radius: 15px; cursor: pointer; }
        .cat-btn.active { background: #0066ff; }

        .container { flex: 1; display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; gap: 20px; }
        .game-card { background: #121c2d; width: 300px; border-radius: 15px; overflow: hidden; border: 1px solid #1e2a42; position: relative; }
        .game-img { width: 100%; height: 160px; object-fit: cover; }
        .game-info { padding: 15px; }
        .game-name { font-size: 1.2rem; font-weight: bold; display: block; margin-bottom: 10px; }
        .game-mod { color: #27ae60; font-size: 0.9rem; margin-bottom: 15px; min-height: 40px; }
        .download-btn { display: block; background: #d4af37; color: #000; text-align: center; padding: 12px; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .category-tag { position: absolute; top: 10px; left: 10px; background: rgba(0, 102, 255, 0.8); padding: 3px 10px; border-radius: 10px; font-size: 0.7rem; }

        /* VIP FOOTER / INSTAGRAM */
        .gold-footer { margin-top: auto; padding: 40px 20px; text-align: center; background: #0a1425; border-top: 1px solid #d4af37; }
        .gold-link { display: inline-block; text-decoration: none; padding: 20px 40px; border: 2px solid #d4af37; border-radius: 20px; background: #121c2d; box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body>

    <div id="bakim-perdesi">
        <h1 style="color: #ff3b3b; font-size: 3rem;">SİTE BAKIMDADIR</h1>
        <p style="font-size: 1.2rem;">Kemal abi şu an güncellemeleri yapıyor...</p>
        <div style="font-size: 4rem; margin: 20px;">⚙️</div>
        <p style="color: #555;">Lütfen daha sonra tekrar deneyiniz.</p>
    </div>

    <div id="ana-icerik">
        <header>
            <h1 style="font-size: 2.5rem; letter-spacing: 3px;">KEMAL MOD</h1>
        </header>

        <div class="search-area">
            <input type="text" id="searchInput" placeholder="Oyun ara Kemal abi..." onkeyup="ara()">
            <div class="categories">
                <button class="cat-btn active" onclick="filtrele('Hepsi', this)">Hepsi</button>
                <button class="cat-btn" onclick="filtrele('Spor', this)">Spor</button>
                <button class="cat-btn" onclick="filtrele('Aksiyon', this)">Aksiyon</button>
                <button class="cat-btn" onclick="filtrele('Yarış', this)">Yarış</button>
                <button class="cat-btn" onclick="filtrele('Simülasyon', this)">Simülasyon</button>
            </div>
        </div>

        <div class="container" id="gameContainer"></div>

        <footer class="gold-footer">
            <a href="https://www.instagram.com/Ke4m2l" target="_blank" class="gold-link">
                <div style="color:#d4af37; font-size:0.7rem; text-transform:uppercase; letter-spacing:3px; margin-bottom:5px;">YAPIMCI INSTAGRAM</div>
                <div style="color:white; font-size:1.6rem; font-weight:bold;">@Ke4m2l</div>
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" style="width:30px; margin-top:10px;" alt="Insta">
            </a>
            <p style="margin-top:20px; color:#444; font-size:0.8rem;">Tüm Modlar Kemal Mod Güvencesiyle</p>
        </footer>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCYS1dMW6uGt8cwJVs6cspNBuX0TTOGS_c", databaseURL: "https://kemalmod-resmi-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Bakım Modu Dinleyicisi
        db.ref('bakimModu').on('value', s => {
            const bakimda = s.val();
            document.getElementById('bakim-perdesi').style.display = bakimda ? "flex" : "none";
            document.getElementById('ana-icerik').style.display = bakimda ? "none" : "block";
        });

        // Veri Çekme
        db.ref('mods').on('value', (snap) => {
            const container = document.getElementById('gameContainer');
            container.innerHTML = "";
            snap.forEach((child) => {
                const g = child.val();
                container.innerHTML += `
                    <div class="game-card" data-category="${g.category || 'Diğer'}">
                        <div class="category-tag">${g.category || 'Diğer'}</div>
                        <img src="${g.img || 'https://via.placeholder.com/300x160/070d19/d4af37?text=KEMAL+MOD'}" class="game-img">
                        <div class="game-info">
                            <span class="game-name">${g.name}</span>
                            <div class="game-mod">${g.mod}</div>
                            <a href="${g.link}" target="_blank" class="download-btn">İNDİR</a>
                        </div>
                    </div>`;
            });
        });

        function ara() {
            let val = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('game-card');
            for(let c of cards) {
                let n = c.querySelector('.game-name').innerText.toLowerCase();
                c.style.display = n.includes(val) ? "block" : "none";
            }
        }

        function filtrele(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            let cards = document.getElementsByClassName('game-card');
            for(let c of cards) {
                c.style.display = (cat==='Hepsi' || c.getAttribute('data-category')===cat) ? "block" : "none";
            }
        }
    </script>
</body>
</html>
