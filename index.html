<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEMAL MOD | APK</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Önceki profesyonel tasarım kodlarını buraya ekleyebilirsin, ana yapı aynı */
        body { background: #0b1121; color: white; font-family: sans-serif; margin: 0; }
        #bakim-perdesi { display: none; position: fixed; inset: 0; background: #0b1121; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #151f32; padding: 20px; border-radius: 15px; border: 1px solid #2a3b5c; }
        .btn { display: block; background: #00d2ff; color: white; text-align: center; padding: 10px; border-radius: 10px; text-decoration: none; margin-top: 10px; font-weight: bold; }
        header { background: #151f32; padding: 20px; text-align: center; border-bottom: 2px solid #00d2ff; }
    </style>
</head>
<body>

    <div id="bakim-perdesi">
        <h1>SİTE BAKIMDADIR ⚙️</h1>
        <p>Kemal abi sistemi güncelliyor...</p>
    </div>

    <div id="ana-site">
        <header><h1>KEMAL MOD</h1></header>
        <div class="container" id="grid"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCYS1dMW6uGt8cwJVs6cspNBuX0TTOGS_c", databaseURL: "https://kemalmod-resmi-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ONLINE TAKİBİ (BU KISIM ÖNEMLİ)
        const myStatusRef = db.ref('online').push();
        myStatusRef.set(true);
        myStatusRef.onDisconnect().remove();

        // BAKIM KONTROLÜ
        db.ref('bakimModu').on('value', s => {
            document.getElementById('bakim-perdesi').style.display = s.val() ? "flex" : "none";
            document.getElementById('ana-site').style.display = s.val() ? "none" : "block";
        });

        // OYUNLARI ÇEK
        db.ref('mods').on('value', snap => {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            snap.forEach(c => {
                const g = c.val();
                grid.innerHTML += `<div class="card">
                    <img src="${g.img}" style="width:100%; border-radius:10px;">
                    <h3>${g.name}</h3>
                    <p style="color:#10b981">${g.mod}</p>
                    <small>Sürüm: ${g.version}</small>
                    <a href="${g.link}" class="btn">HİLEYİ İNDİR</a>
                </div>`;
            });
        });
    </script>
</body>
</html>
