<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEMAL MOD | APK MERKEZİ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #070d19; color: white; font-family: sans-serif; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: #121c2d; padding: 20px; text-align: center; border-bottom: 2px solid #0066ff; }
        .search-area { padding: 20px; text-align: center; background: #0a1425; }
        #searchInput { width: 85%; max-width: 500px; padding: 12px; border-radius: 25px; border: 1px solid #0066ff; background: #121c2d; color: white; }
        .categories { margin-top: 15px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .cat-btn { background: #1e2a42; border: 1px solid #333; padding: 8px 15px; border-radius: 15px; color: white; cursor: pointer; }
        .cat-btn.active { background: #0066ff; }
        .container { flex: 1; display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; gap: 20px; }
        .game-card { background: #121c2d; width: 300px; border-radius: 15px; overflow: hidden; border: 1px solid #1e2a42; position: relative; }
        .game-img { width: 100%; height: 160px; object-fit: cover; }
        .game-info { padding: 15px; }
        .game-name { font-size: 1.2rem; font-weight: bold; display: block; margin-bottom: 8px; }
        .game-mod { color: #27ae60; font-size: 0.9rem; margin-bottom: 12px; min-height: 40px; }
        .download-btn { display: block; background: #d4af37; color: #000; text-align: center; padding: 12px; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .category-tag { position: absolute; top: 10px; left: 10px; background: rgba(0, 102, 255, 0.8); padding: 3px 10px; border-radius: 10px; font-size: 0.7rem; }
        
        /* BAKIM EKRANI */
        #bakim-ekrani { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#070d19; z-index:9999; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
        .gold-border { border: 2px solid #d4af37; padding: 40px; border-radius: 20px; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }

        /* VIP FOOTER */
        .gold-footer { margin-top: auto; padding: 40px 20px; text-align: center; background: #0a1425; border-top: 1px solid #d4af37; }
        .gold-link { display: inline-block; text-decoration: none; padding: 15px 30px; border: 2px solid #d4af37; border-radius: 20px; background: #121c2d; }
    </style>
</head>
<body>

<div id="bakim-ekrani">
    <div class="gold-border">
        <h2 style="color:#d4af37;">KEMAL MOD</h2>
        <h3>ŞU AN BAKIMDAYIZ 🛠️</h3>
        <p>Kemal abi sistemi güncelliyor, birazdan gel!</p>
        <p style="color:#d4af37; font-size:0.8rem;">İletişim: @Ke4m2l</p>
    </div>
</div>

<header><h1>KEMAL MOD</h1></header>

<div class="search-area">
    <input type="text" id="searchInput" placeholder="Oyun ara Kemal abi..." onkeyup="filterGames()">
    <div class="categories">
        <button class="cat-btn active" onclick="filterCategory('Hepsi', this)">Hepsi</button>
        <button class="cat-btn" onclick="filterCategory('Spor', this)">Spor</button>
        <button class="cat-btn" onclick="filterCategory('Aksiyon', this)">Aksiyon</button>
        <button class="cat-btn" onclick="filterCategory('Yarış', this)">Yarış</button>
        <button class="cat-btn" onclick="filterCategory('Simülasyon', this)">Simülasyon</button>
    </div>
</div>

<div class="container" id="gameContainer"></div>

<footer class="gold-footer">
    <a href="https://www.instagram.com/Ke4m2l" target="_blank" class="gold-link">
        <div style="color:#d4af37; font-size:0.7rem; letter-spacing:2px;">YAPIMCI INSTAGRAM</div>
        <div style="font-size:1.4rem; font-weight:bold; color:white;">@Ke4m2l</div>
    </a>
</footer>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCYS1dMW6uGt8cwJVs6cspNBuX0TTOGS_c",
        databaseURL: "https://kemalmod-resmi-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Bakım Modu Bekçisi
    db.ref('bakimModu').on('value', s => {
        document.getElementById('bakim-ekrani').style.display = s.val() ? "flex" : "none";
    });

    db.ref('mods').on('value', (snap) => {
        const container = document.getElementById('gameContainer');
        container.innerHTML = "";
        snap.forEach((child) => {
            const g = child.val();
            container.innerHTML += `
                <div class="game-card" data-category="${g.category || 'Diğer'}">
                    <div class="category-tag">${g.category || 'Diğer'}</div>
                    <img src="${g.img || 'https://via.placeholder.com/300x160/070d19/d4af37?text=KEMAL+MOD'}" class="game-img">
                    <div class="game-info">
                        <span class="game-name">${g.name}</span>
                        <div class="game-mod">${g.mod}</div>
                        <a href="${g.link}" target="_blank" class="download-btn">İNDİR</a>
                    </div>
                </div>`;
        });
    });

    function filterGames() {
        let val = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('game-card');
        for(let c of cards) {
            let name = c.querySelector('.game-name').innerText.toLowerCase();
            c.style.display = name.includes(val) ? "block" : "none";
        }
    }

    function filterCategory(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        let cards = document.getElementsByClassName('game-card');
        for(let c of cards) {
            c.style.display = (cat==='Hepsi' || c.getAttribute('data-category')===cat) ? "block" : "none";
        }
777777</script>
</body>
</html>
