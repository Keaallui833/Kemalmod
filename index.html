<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEMAL MOD | Profesyonel APK Platformu</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0b1121; --card: #151f32; --primary: #3b82f6; --accent: #ffb700; --text: #f1f5f9; }
        body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        header { background: #151f32; padding: 25px; text-align: center; border-bottom: 3px solid var(--primary); box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .logo { font-size: 2.5rem; font-weight: 900; letter-spacing: 4px; color: var(--primary); margin: 0; text-transform: uppercase; }

        /* ARAMA VE KATEGORİ */
        .search-area { padding: 30px 20px; max-width: 900px; margin: auto; }
        .search-box { position: relative; margin-bottom: 20px; }
        .search-box input { width: 100%; padding: 18px 60px; border-radius: 50px; border: 1px solid #2a3b5c; background: var(--card); color: white; font-size: 1.1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .search-box i { position: absolute; left: 25px; top: 50%; transform: translateY(-50%); color: #64748b; font-size: 1.3rem; }

        .categories { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .cat-btn { background: var(--card); border: 1px solid #2a3b5c; color: #94a3b8; padding: 10px 20px; border-radius: 30px; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* OYUN KARTLARI */
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding: 20px; max-width: 1250px; margin: auto; }
        .card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #2a3b5c; transition: 0.3s; }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .card-img { width: 100%; height: 190px; object-fit: cover; }
        
        .card-body { padding: 20px; }
        .card-title { font-size: 1.3rem; font-weight: 800; margin: 0 0 10px 0; color: white; }
        
        /* METALER: SÜRÜM VE YILDIZ */
        .meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; background: rgba(0,0,0,0.3); padding: 8px 12px; border-radius: 10px; }
        .version-tag { font-size: 0.85rem; color: #94a3b8; font-weight: bold; }
        .star-box { color: var(--accent); font-weight: 900; font-size: 0.95rem; }

        .mod-info { color: #10b981; font-weight: 600; font-size: 0.9rem; margin-bottom: 15px; }
        .btn-download { display: block; background: var(--primary); color: white; text-align: center; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: 800; transition: 0.3s; }

        /* INSTAGRAM PANELİ */
        .insta-footer-box { margin: 50px auto; max-width: 400px; padding: 25px; border: 2px solid var(--accent); border-radius: 25px; text-align: center; background: rgba(255,183,0,0.05); }
        .insta-tag { font-size: 0.7rem; letter-spacing: 3px; color: var(--accent); font-weight: 900; display: block; margin-bottom: 5px; }
        .insta-link { font-size: 2rem; font-weight: 900; color: white; text-decoration: none; }
    </style>
</head>
<body>

    <header><h1 class="logo">KEMAL MOD</h1></header>

    <section class="search-area">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Oyun ara Kemal abi..." onkeyup="searchGame()">
        </div>
        <div class="categories">
            <button class="cat-btn active" onclick="filter('Hepsi', this)">Tümü</button>
            <button class="cat-btn" onclick="filter('Aksiyon', this)">Aksiyon</button>
            <button class="cat-btn" onclick="filter('Spor', this)">Spor</button>
            <button class="cat-btn" onclick="filter('Yarış', this)">Yarış</button>
            <button class="cat-btn" onclick="filter('Simülasyon', this)">Simülasyon</button>
        </div>
    </section>

    <main class="container" id="gameGrid"></main>

    <div class="insta-footer-box">
        <span class="insta-tag">YAPIMCI INSTAGRAM</span>
        <a href="https://instagram.com/Ke4m2l" target="_blank" class="insta-link">@Ke4m2l</a>
        <br><img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" width="30" style="margin-top:10px;">
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCYS1dMW6uGt8cwJVs6cspNBuX0TTOGS_c", databaseURL: "https://kemalmod-resmi-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('mods').on('value', snap => {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = "";
            snap.forEach(child => {
                const g = child.val();
                // "undefined" hatasını engelleyen kontrol eklendi
                const versionText = g.version ? g.version : 'v1.0'; 
                
                grid.innerHTML += `
                <div class="card" data-category="${g.category}">
                    <img src="${g.img}" class="card-img">
                    <div class="card-body">
                        <h3 class="card-title">${g.name}</h3>
                        <div class="meta-row">
                            <span class="version-tag">Sürüm: ${versionText}</span>
                            <span class="star-box"><i class="fas fa-star"></i> 5.0</span>
                        </div>
                        <p class="mod-info">${g.mod}</p>
                        <a href="${g.link}" target="_blank" class="btn-download">GÜVENLİ İNDİR</a>
                    </div>
                </div>`;
            });
        });

        function searchGame() {
            let val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.querySelector('.card-title').innerText.toLowerCase().includes(val) ? "block" : "none";
            });
        }

        function filter(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = (cat === 'Hepsi' || c.getAttribute('data-category') === cat) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
