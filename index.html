<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEMAL MOD | APK MERKEZİ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0a0f1e; color: #fff; padding-bottom: 50px; }
        header { background: #121c2d; padding: 20px; text-align: center; border-bottom: 3px solid #0066ff; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; color: #0066ff; }
        .container { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .card { background: #121c2d; border-radius: 12px; overflow: hidden; border: 1px solid #1e2a42; }
        .card img { width: 100%; height: 120px; object-fit: cover; background: #070d19; }
        .card-body { padding: 10px; }
        .card-title { font-size: 14px; font-weight: bold; margin-bottom: 5px; height: 34px; overflow: hidden; }
        .card-mod { color: #00ff88; font-size: 11px; font-weight: bold; margin-bottom: 10px; display: block; }
        .download-btn { background: #0066ff; color: white; border: none; width: 100%; padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer; text-decoration: none; display: block; text-align: center; }
    </style>
</head>
<body>
    <header><div class="logo">KEMAL MOD</div></header>
    <div class="container" id="game-list"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCYS1dMW6uGt8cwJVs6cspNBuX0TTOGS_c",
            databaseURL: "https://kemalmod-resmi-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('mods').on('value', (snapshot) => {
            const list = document.getElementById('game-list');
            list.innerHTML = "";
            snapshot.forEach((child) => {
                const game = child.val();
                list.innerHTML += `
                    <div class="card">
                        <img src="${game.img || 'https://via.placeholder.com/150/070d19/0066ff?text=Kemal+Mod'}" alt="${game.name}">
                        <div class="card-body">
                            <div class="card-title">${game.name}</div>
                            <span class="card-mod">${game.mod}</span>
                            <a href="${game.link}" target="_blank" class="download-btn">İNDİR</a>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
