<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEMAL MOD | APK MERKEZİ</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #070d19; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        header { background: #121c2d; padding: 20px; text-align: center; border-bottom: 2px solid #0066ff; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        h1 { color: #0066ff; margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        /* ARAMA VE KATEGORİ */
        .search-area { padding: 20px; text-align: center; background: #0a1425; }
        #searchInput { width: 80%; max-width: 500px; padding: 12px; border-radius: 25px; border: 1px solid #0066ff; background: #121c2d; color: white; outline: none; }
        .categories { margin-top: 15px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .cat-btn { background: #1e2a42; color: white; border: 1px solid #333; padding: 8px 15px; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .cat-btn:hover, .cat-btn.active { background: #0066ff; border-color: #fff; }

        /* OYUN KARTLARI */
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; gap: 20px; }
        .game-card { background: #121c2d; width: 300px; border-radius: 15px; overflow: hidden; border: 1px solid #1e2a42; transition: 0.3s; position: relative; }
        .game-card:hover { transform: translateY(-5px); border-color: #0066ff; }
        .game-img { width: 100%; height: 160px; object-fit: cover; background: #070d19; }
        .game-info { padding: 15px; }
        .game-name { font-size: 1.2rem; font-weight: bold; color: #fff; margin-bottom: 10px; display: block; }
        .game-mod { color: #27ae60; font-size: 0.9rem; margin-bottom: 15px; height: 40px; overflow: hidden; }
        .download-btn { display: block; background: #0066ff; color: white; text-align: center; padding: 10px; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .category-tag { position: absolute; top: 10px; left: 10px; background: rgba(0, 102, 255, 0.8); padding: 3px 10px; border-radius: 10px; font-size: 0.7rem; }
    </style>
</head>
<body>

<header>
    <h1>KEMAL MOD</h1>
</header>

<div class="search-area">
    <input type="text" id="searchInput" placeholder="Oyun ara Kemal abi..." onkeyup="filterGames()">
    <div class="categories">
        <button class="cat-btn active" onclick="filterCategory('Hepsi', this)">Hepsi</button>
        <button class="cat-btn" onclick="filterCategory('Spor', this)">Spor</button>
        <button class="cat-btn" onclick="filterCategory('Aksiyon', this)">Aksiyon</button>
        <button class="cat-btn" onclick="filterCategory('Yarış', this)">Yarış</button>
        <button class="cat-btn" onclick="filterCategory('Simülasyon', this)">Simülasyon</button>
    </div>
</div>

<div class="container" id="gameContainer">
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCYS1dMW6uGt8cwJVs6cspNBuX0TTOGS_c",
        databaseURL: "https://kemalmod-resmi-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allGames = [];

    // VERİLERİ ÇEK
    db.ref('mods').on('value', (snapshot) => {
        const container = document.getElementById('gameContainer');
        container.innerHTML = "";
        allGames = [];

        snapshot.forEach((child) => {
            const game = child.val();
            game.id = child.key;
            allGames.push(game);
            renderCard(game);
        });
    });

    function renderCard(game) {
        const container = document.getElementById('gameContainer');
        const defaultImg = "https://via.placeholder.com/300x160/070d19/0066ff?text=KEMAL+MOD";
        
        container.innerHTML += `
            <div class="game-card" data-category="${game.category || 'Diğer'}">
                <div class="category-tag">${game.category || 'Diğer'}</div>
                <img src="${game.img || defaultImg}" class="game-img" alt="${game.name}">
                <div class="game-info">
                    <span class="game-name">${game.name}</span>
                    <div class="game-mod">${game.mod}</div>
                    <a href="${game.link}" target="_blank" class="download-btn">İNDİR</a>
                </div>
            </div>
        `;
    }

    // ARAMA FONKSİYONU
    function filterGames() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const cards = document.getElementsByClassName('game-card');

        for (let card of cards) {
            const name = card.querySelector('.game-name').innerText.toLowerCase();
            if (name.includes(searchTerm)) {
                card.style.display = "block";
            } else {
                card.style.display = "none";
            }
        }
    }

    // KATEGORİ FİLTRELEME
    function filterCategory(cat, btn) {
        // Buton rengini değiştir
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const cards = document.getElementsByClassName('game-card');
        for (let card of cards) {
            if (cat === 'Hepsi' || card.getAttribute('data-category') === cat) {
                card.style.display = "block";
            } else {
                card.style.display = "none";
            }
        }
    }
</script>

</body>
</html>
