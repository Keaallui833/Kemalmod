<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEMAL MOD | Profesyonel APK Merkezi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary: #0066ff; --gold: #d4af37; --bg: #050a14; --card-bg: #101827; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* BAKIM EKRANI */
        #bakim-perdesi {
            display: none; position: fixed; inset: 0; background: var(--bg); z-index: 100000;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        .bakim-kutu { border: 2px solid var(--gold); padding: 50px; border-radius: 30px; background: rgba(255,255,255,0.02); backdrop-filter: blur(10px); }

        /* HEADER */
        header { 
            background: rgba(16, 24, 39, 0.8); backdrop-filter: blur(15px);
            padding: 20px; text-align: center; border-bottom: 2px solid var(--primary);
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 2.2rem; font-weight: 900; letter-spacing: 5px; color: #fff; text-shadow: 0 0 15px var(--primary); margin: 0; }
        
        /* ARAMA VE FİLTRE */
        .hero { padding: 40px 20px; text-align: center; background: radial-gradient(circle at top, #001a3d, var(--bg)); }
        #searchInput { 
            width: 90%; max-width: 600px; padding: 15px 25px; border-radius: 50px; 
            border: 1px solid #333; background: #1a2436; color: white; font-size: 1.1rem;
            transition: 0.3s; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        #searchInput:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }

        .categories { margin-top: 25px; display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; }
        .cat-btn { 
            background: #1a2436; border: 1px solid #333; color: #ccc; padding: 10px 20px; 
            border-radius: 30px; cursor: pointer; transition: 0.3s; font-weight: 600;
        }
        .cat-btn:hover, .cat-btn.active { background: var(--primary); color: white; border-color: white; transform: translateY(-3px); }

        /* OYUN KARTLARI */
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 40px; max-width: 1400px; margin: auto; }
        .game-card { 
            background: var(--card-bg); border-radius: 20px; overflow: hidden; 
            border: 1px solid #1f2937; transition: 0.4s; position: relative;
        }
        .game-card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: 0 15px 30px rgba(0,0,0,0.6); }
        .game-img-wrap { position: relative; width: 100%; height: 180px; overflow: hidden; }
        .game-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .game-card:hover .game-img { scale: 1.1; filter: brightness(0.7); }
        
        .badge { position: absolute; top: 15px; left: 15px; background: var(--primary); padding: 5px 12px; border-radius: 10px; font-size: 0.75rem; font-weight: bold; }
        
        .game-info { padding: 20px; }
        .game-name { font-size: 1.3rem; font-weight: bold; color: white; display: block; margin-bottom: 5px; }
        .game-mod-desc { color: #10b981; font-size: 0.9rem; font-weight: 500; margin-bottom: 15px; height: 40px; overflow: hidden; }
        
        .download-btn { 
            display: block; background: linear-gradient(45deg, var(--gold), #f39c12); 
            color: black; text-align: center; padding: 12px; text-decoration: none; 
            border-radius: 12px; font-weight: 900; letter-spacing: 1px; transition: 0.3s;
        }
        .download-btn:hover { filter: brightness(1.2); letter-spacing: 2px; }

        /* FOOTER */
        footer { background: #0a101d; padding: 60px 20px; text-align: center; border-top: 1px solid #1f2937; }
        .insta-card { 
            display: inline-block; padding: 25px 50px; border: 2px solid var(--gold); 
            border-radius: 25px; background: rgba(212, 175, 55, 0.05); text-decoration: none; 
            transition: 0.4s;
        }
        .insta-card:hover { background: var(--gold); }
        .insta-card:hover * { color: black !important; }
    </style>
</head>
<body>

    <div id="bakim-perdesi">
        <div class="bakim-kutu">
            <h1 style="color:var(--gold); font-size: 3rem; margin:0;">KEMAL MOD</h1>
            <h2 style="margin: 20px 0;">SİSTEM GÜNCELENİYOR</h2>
            <p style="color:#888;">Toprak Koç'u geçmeye çok az kaldı. Kemal abi şu an sistemi güçlendiriyor!</p>
            <div style="font-size: 4rem; margin: 30px;">⚡</div>
            <p style="color:var(--gold); font-weight: bold;">Instagram: @Ke4m2l</p>
        </div>
    </div>

    <div id="ana-site">
        <header>
            <h1 class="logo">KEMAL MOD</h1>
        </header>

        <section class="hero">
            <input type="text" id="searchInput" placeholder="Oyunlarda hile ara Kemal abi..." onkeyup="ara()">
            <div class="categories">
                <button class="cat-btn active" onclick="filtrele('Hepsi', this)">Tüm Oyunlar</button>
                <button class="cat-btn" onclick="filtrele('Spor', this)">Spor</button>
                <button class="cat-btn" onclick="filtrele('Aksiyon', this)">Aksiyon</button>
                <button class="cat-btn" onclick="filtrele('Yarış', this)">Yarış</button>
                <button class="cat-btn" onclick="filtrele('Simülasyon', this)">Simülasyon</button>
            </div>
        </section>

        <div class="container" id="gameContainer">
            </div>

        <footer>
            <a href="https://www.instagram.com/Ke4m2l" target="_blank" class="insta-card">
                <div style="color:var(--gold); font-size:0.8rem; letter-spacing:4px; margin-bottom:10px;">YAPIMCI</div>
                <div style="color:white; font-size:2rem; font-weight:900;">@Ke4m2l</div>
                <div style="margin-top:15px; color:#555;">Tıkla ve Takip Et</div>
            </a>
            <p style="margin-top:40px; color:#333;">© 2026 Kemal Mod | Android Oyun Club'a Tek Rakip</p>
        </footer>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCYS1dMW6uGt8cwJVs6cspNBuX0TTOGS_c", databaseURL: "https://kemalmod-resmi-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // BAKIM KONTROLÜ
        db.ref('bakimModu').on('value', s => {
            const bakimda = s.val();
            document.getElementById('bakim-perdesi').style.display = bakimda ? "flex" : "none";
            document.getElementById('ana-site').style.display = bakimda ? "none" : "block";
        });

        // VERİLERİ ÇEK
        db.ref('mods').on('value', (snap) => {
            const container = document.getElementById('gameContainer');
            container.innerHTML = "";
            snap.forEach((child) => {
                const g = child.val();
                container.innerHTML += `
                    <div class="game-card" data-category="${g.category || 'Diğer'}">
                        <div class="game-img-wrap">
                            <div class="badge">${g.category || 'APK'}</div>
                            <img src="${g.img || 'https://via.placeholder.com/300x180'}" class="game-img">
                        </div>
                        <div class="game-info">
                            <span class="game-name">${g.name}</span>
                            <div class="game-mod-desc">${g.mod}</div>
                            <a href="${g.link}" target="_blank" class="download-btn">HİLEYİ İNDİR</a>
                        </div>
                    </div>`;
            });
        });

        function ara() {
            let val = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.querySelectorAll('.game-card');
            cards.forEach(c => {
                let name = c.querySelector('.game-name').innerText.toLowerCase();
                c.style.display = name.includes(val) ? "block" : "none";
            });
        }

        function filtrele(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            let cards = document.querySelectorAll('.game-card');
            cards.forEach(c => {
                c.style.display = (cat === 'Hepsi' || c.getAttribute('data-category') === cat) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
