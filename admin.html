<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>KEMAL MOD | Admin Kontrol Merkezi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #050a14; color: white; font-family: sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .panel { background: #101827; padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid var(--primary); margin-bottom: 30px; border: 1px solid #1e2937; }
        h2, h3 { text-align: center; color: #0066ff; }
        input, select, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: none; font-size: 1rem; }
        input, select { background: #1a2436; color: white; border: 1px solid #333; }
        button { background: #0066ff; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { filter: brightness(1.2); }
        .bakim-panel { border-color: #ff3b3b; }
        .game-item { background: #1a2436; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { background: #ff3b3b; width: auto; padding: 8px 15px; }
    </style>
</head>
<body>

    <div class="panel bakim-panel">
        <h3>🚨 SİSTEM ŞALTERİ</h3>
        <div id="bakim-durum" style="text-align:center; font-weight:bold; margin-bottom:15px;">YÜKLENİYOR...</div>
        <button id="bakim-btn" onclick="bakimDegistir()">DURUM DEĞİŞTİR</button>
    </div>

    <div class="panel">
        <h2>Oyun Ekle / Güncelle</h2>
        <input type="text" id="n" placeholder="Oyun Adı (Örn: PUBG Mobile)">
        <input type="text" id="m" placeholder="Hile Özelliği (Örn: Sekmeme + Hız)">
        <input type="text" id="l" placeholder="İndirme Linki (Drive/Mega)">
        <input type="text" id="i" placeholder="Kapak Resmi Linki">
        <select id="cat">
            <option value="Spor">Spor</option>
            <option value="Aksiyon">Aksiyon</option>
            <option value="Yarış">Yarış</option>
            <option value="Simülasyon">Simülasyon</option>
            <option value="Diğer">Diğer</option>
        </select>
        <button onclick="kaydet()">SİTEYE GÖNDER 🚀</button>
    </div>

    <div class="panel">
        <h3>Yüklenen Modlar</h3>
        <div id="game-list"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCYS1dMW6uGt8cwJVs6cspNBuX0TTOGS_c", databaseURL: "https://kemalmod-resmi-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Bakım Modu
        db.ref('bakimModu').on('value', s => {
            const aktif = s.val();
            const d = document.getElementById('bakim-durum');
            const b = document.getElementById('bakim-btn');
            d.innerText = aktif ? "SİTE KAPALI ⛔" : "SİTE HERKESE AÇIK ✅";
            d.style.color = aktif ? "#ff3b3b" : "#27ae60";
            b.innerText = aktif ? "SİTEYİ AÇ" : "SİTEYİ BAKIMA AL";
            b.style.background = aktif ? "#27ae60" : "#ff3b3b";
        });

        function bakimDegistir() {
            db.ref('bakimModu').once('value').then(s => db.ref('bakimModu').set(!s.val()));
        }

        function kaydet() {
            const data = {
                name: document.getElementById('n').value,
                mod: document.getElementById('m').value,
                link: document.getElementById('l').value,
                img: document.getElementById('i').value,
                category: document.getElementById('cat').value
            };
            db.ref('mods').push(data).then(() => { alert("Başarıyla Fırlatıldı!"); location.reload(); });
        }

        db.ref('mods').on('value', (snap) => {
            const list = document.getElementById('game-list');
            list.innerHTML = "";
            snap.forEach((child) => {
                const g = child.val();
                list.innerHTML += `
                    <div class="game-item">
                        <span>${g.name}</span>
                        <button class="del-btn" onclick="db.ref('mods').child('${child.key}').remove()">SİL</button>
                    </div>`;
            });
        });
    </script>
</body>
</html>
