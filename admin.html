<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>KEMAL MOD | YÖNETİM</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #070d19; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .panel { background: #121c2d; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid #0066ff; margin-bottom: 20px; text-align: center; }
        button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; color: white; }
        #bakim-durum { font-size: 1.2rem; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="panel" style="border-color: #ff3b3b;">
        <h3>SİTE ERİŞİM ŞALTERİ</h3>
        <div id="bakim-durum">BAĞLANILIYOR...</div>
        <button id="bakim-btn" onclick="bakimDegistir()">YÜKLENİYOR...</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCYS1dMW6uGt8cwJVs6cspNBuX0TTOGS_c", databaseURL: "https://kemalmod-resmi-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('bakimModu').on('value', (s) => {
            const aktif = s.val();
            const d = document.getElementById('bakim-durum');
            const b = document.getElementById('bakim-btn');
            d.innerText = aktif ? "DURUM: SİTE KAPALI (BAKIMDA)" : "DURUM: SİTE HERKESE AÇIK";
            d.style.color = aktif ? "#ff3b3b" : "#27ae60";
            b.innerText = aktif ? "SİTEYİ YAYINA AL" : "SİTEYİ BAKIMA AL (KİLİTLE)";
            b.style.background = aktif ? "#27ae60" : "#ff3b3b";
        });

        function bakimDegistir() {
            db.ref('bakimModu').once('value').then(s => db.ref('bakimModu').set(!s.val()));
        }
    </script>
</body>
</html>
